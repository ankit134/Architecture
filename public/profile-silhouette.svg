<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Adarsha Sapkota portrait silhouette">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="0.55" stop-color="#151515"/>
      <stop offset="1" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="rim" x1="400" y1="40" x2="400" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#888888" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="figure" x1="280" y1="60" x2="520" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2f2f2"/>
      <stop offset="0.55" stop-color="#d8d8d8"/>
      <stop offset="1" stop-color="#9a9a9a"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 210) rotate(90) scale(280 200)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.65" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#halo)"/>

  <!-- shoulders & head — editorial profile -->
  <g filter="url(#soft)">
    <path
      fill="url(#figure)"
      d="M400 72c-62 0-108 38-118 96-6 36 8 68 38 92-48 22-82 68-88 124-5 48 28 94 88 112 14 6 30 10 46 10h132c16 0 32-4 46-10 60-18 93-64 88-112-6-56-40-102-88-124 30-24 44-56 38-92-10-58-56-96-118-96zm-6 118c-2 28 16 52 42 64 38 16 82 14 118-6 30-17 48-48 44-82-4-38-32-68-70-76-40-8-82 4-108 32-14 16-22 38-26 68z"
    />
    <path
      fill="url(#rim)"
      d="M400 72c-62 0-108 38-118 96-6 36 8 68 38 92-48 22-82 68-88 124-5 48 28 94 88 112 14 6 30 10 46 10h132c16 0 32-4 46-10 60-18 93-64 88-112-6-56-40-102-88-124 30-24 44-56 38-92-10-58-56-96-118-96zm-6 118c-2 28 16 52 42 64 38 16 82 14 118-6 30-17 48-48 44-82-4-38-32-68-70-76-40-8-82 4-108 32-14 16-22 38-26 68z"
      opacity="0.35"
    />
  </g>

  <!-- floor fade -->
  <rect x="0" y="420" width="800" height="80" fill="url(#bg)" opacity="0.85"/>
  <line x1="120" y1="438" x2="680" y2="438" stroke="#888888" stroke-opacity="0.35" stroke-width="0.5"/>
</svg>
